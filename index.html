<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Calculator</title>
  <style>
    :root {
      font-family: Arial, Helvetica, sans-serif;
      color-scheme: light dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2f80ed, #56ccf2);
    }

    .calculator {
      width: min(320px, 92vw);
      background: #1f2937;
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
    }

    .display {
      width: 100%;
      font-size: 2rem;
      text-align: right;
      border: none;
      border-radius: 10px;
      padding: 0.75rem;
      box-sizing: border-box;
      margin-bottom: 0.75rem;
      background: #111827;
      color: #f9fafb;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 0.8rem;
      font-size: 1.05rem;
      cursor: pointer;
      background: #374151;
      color: #f9fafb;
    }

    button:hover {
      filter: brightness(1.1);
    }

    .operator { background: #f59e0b; }
    .equals { background: #10b981; grid-column: span 2; }
    .clear { background: #ef4444; }
    .zero { grid-column: span 2; }
  </style>
</head>
<body>
  <main class="calculator" aria-label="Calculator">
    <input id="display" class="display" type="text" value="0" readonly />
    <section class="keys">
      <button class="clear" data-action="clear">C</button>
      <button data-action="delete">⌫</button>
      <button class="operator" data-value="/">÷</button>
      <button class="operator" data-value="*">×</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="operator" data-value="-">−</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="operator" data-value="+">+</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button data-action="decimal">.</button>

      <button class="zero" data-value="0">0</button>
      <button class="equals" data-action="equals">=</button>
    </section>
  </main>

  <script>
    const display = document.getElementById('display');
    const keys = document.querySelector('.keys');

    const setDisplay = (value) => {
      display.value = value.toString().slice(0, 20);
    };

    keys.addEventListener('click', (event) => {
      const button = event.target.closest('button');
      if (!button) return;

      const action = button.dataset.action;
      const value = button.dataset.value;
      let current = display.value;

      if (action === 'clear') {
        setDisplay('0');
        return;
      }

      if (action === 'delete') {
        setDisplay(current.length > 1 ? current.slice(0, -1) : '0');
        return;
      }

      if (action === 'decimal') {
        const lastPart = current.split(/[-+*/]/).pop();
        if (!lastPart.includes('.')) setDisplay(current + '.');
        return;
      }

      if (action === 'equals') {
        try {
          const result = Function(`"use strict"; return (${current})`)();
          setDisplay(Number.isFinite(result) ? result : 'Error');
        } catch {
          setDisplay('Error');
        }
        return;
      }

      if (value) {
        const isOperator = /[+\-*/]/.test(value);
        const lastChar = current.slice(-1);

        if (current === '0' && !isOperator) {
          setDisplay(value);
          return;
        }

        if (isOperator && /[+\-*/]/.test(lastChar)) {
          setDisplay(current.slice(0, -1) + value);
          return;
        }

        if (current === 'Error') {
          setDisplay(isOperator ? '0' + value : value);
          return;
        }

        setDisplay(current + value);
      }
    });
  </script>
</body>
</html>
